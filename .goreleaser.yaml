version: 2

# Per SPEC.md §15: the single distribution unit is the `ai` binary.
# Hooks, wrapper templates, and pattern sets are embedded into the
# binary via //go:embed (see src/cmd/ai/embed/) and extracted onto
# disk at install time via `ai hooks install --all` /
# `ai hooks install command-wrappers`. No separate shell scripts ship.

before:
  hooks:
    - go work sync
    - go mod tidy -C ./src/cmd/ai
    - go mod tidy -C ./src/internal

builds:
  - id: ai
    main: ./src/cmd/ai
    binary: ai
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    # Stamp the version + commit into internal/buildinfo, the package
    # that `ai version` reads from. Earlier draft targeted `main` —
    # which has no `version` var — so the stamp silently did nothing.
    ldflags:
      - -s
      - -w
      - -X github.com/convergent-systems-co/aiConstitution/src/cmd/ai/internal/buildinfo.version=v{{.Version}}
      - -X github.com/convergent-systems-co/aiConstitution/src/cmd/ai/internal/buildinfo.commit={{.Commit}}
      - -X github.com/convergent-systems-co/aiConstitution/src/cmd/ai/internal/buildinfo.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

brews:
  - name: ai
    description: "AI Constitution CLI — govern your AI assistant with a personal constitution"
    homepage: "https://github.com/convergent-systems-co/aiConstitution"
    license: "Apache-2.0"
    repository:
      owner: convergent-systems-co
      name: homebrew-tap
      token: "{{ .Env.PACKAGE_PUBLISH_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "feat(formula): update ai to {{ .Tag }}"
    directory: Formula
    install: |
      bin.install "ai"
    caveats: |
      The ai binary may be blocked by macOS Gatekeeper on first run.
      To clear the quarantine flag:

        xattr -d com.apple.quarantine "#{bin}/ai"

      Then run: ai doctor
    test: |
      system "#{bin}/ai", "version"

changelog:
  use: github
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]
