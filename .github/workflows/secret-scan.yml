name: Secret scan

# Per SPEC.md §10.1 the canonical secret pattern source is
# hooks/patterns.json. The same patterns are consumed by
# secret-block.py (PreToolUse), secret-precommit.py (git pre-commit),
# the pre-sync scan, and the redaction pass in `ai issue file`.
#
# Per SPEC.md §10.4, trufflehog is NOT used in this pipeline.
# Rationale: trufflehog is heavier than the diff-regex pass needed;
# its entropy heuristic false-positives on UUIDs and generated
# identifiers; patterns.json is auditable (every pattern is a
# deliberate, versioned decision). Users who want server-side
# defense-in-depth opt into gitleaks via
# settings.secret_scanning.ciScanner = "gitleaks".

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  patterns-scan:
    name: patterns.json diff scan
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      BASE_REF: ${{ github.base_ref }}
      BEFORE_SHA: ${{ github.event.before }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan diff against hooks/patterns.json
        shell: bash
        run: |
          set -euo pipefail

          # Determine the diff range from env vars (NOT direct ${{ }}
          # interpolation, per GitHub Actions injection guidance).
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="origin/${BASE_REF}"
            head="HEAD"
          else
            base="${BEFORE_SHA:-$(git rev-list --max-parents=0 HEAD)}"
            head="HEAD"
          fi

          # If the matcher itself is missing (e.g. on the seed branch
          # before hooks/ ships), exit cleanly with a note. CI will
          # still surface the missing-matcher condition via the
          # build/lint jobs.
          if [[ ! -f hooks/secret-precommit.py ]]; then
            echo "::notice::hooks/secret-precommit.py not present; skipping (initial scaffold)"
            exit 0
          fi
          if [[ ! -f hooks/patterns.json ]]; then
            echo "::notice::hooks/patterns.json not present; skipping (initial scaffold)"
            exit 0
          fi

          # Use the same hook the local pre-commit installs, in --ci
          # mode (scans a diff range rather than the staged index).
          python3 hooks/secret-precommit.py --ci --base "$base" --head "$head"
