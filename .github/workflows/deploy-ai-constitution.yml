name: Deploy ai-constitution.convergent-systems.co

# Cloudflare Pages direct-upload deploy of web/ai-constitution/.
# Terraform creates the Pages PROJECT (see terraform/ai-constitution/);
# this workflow uploads the built artifact via the
# cs-page-deployment composite action from action-atoms.
#
# Canonical atom URL (SPEC.md §7.11):
#   https://action-atoms.com/github/composite/cs-page-deployment@1.0.0
#
# The `uses:` form below is the GH-grammar equivalent. Per the spec's
# canonical-identity-vs-consumption-form model (§7.11.1), the two
# refer to the same artifact; the atoms.com URL is the human/CLI
# form, the `uses:` form is what GHA actually resolves.

on:
  push:
    branches: [main]
    paths:
      - 'web/ai-constitution/**'
      - '.github/workflows/deploy-ai-constitution.yml'
  workflow_dispatch:
    inputs:
      preview:
        description: 'Deploy as a preview (separate URL) instead of production'
        type: boolean
        default: false

# Pages deploys are race-sensitive — only one in flight per branch.
concurrency:
  group: pages-ai-constitution
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-constitution.convergent-systems.co
    env:
      # cs-page-deployment reads these from the env.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Workflow-dispatch input pulled into env (injection-safe per
      # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).
      PREVIEW: ${{ github.event.inputs.preview }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute deploy branch label
        id: branch
        shell: bash
        run: |
          # cs-page-deployment takes `branch` as a single input.
          # "main" → production; anything else → preview URL.
          if [ "$PREVIEW" = "true" ]; then
            echo "label=preview-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          else
            echo "label=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Cloudflare credentials
        shell: bash
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secret"
            exit 1
          fi
          # Use the Pages project endpoint — the same one wrangler calls.
          # /user/tokens/verify requires User:API Tokens:Read which a
          # Pages-scoped token does not have, so we validate against the
          # actual resource the deploy needs.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/ai-constitution")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cloudflare Pages API returned HTTP $HTTP_STATUS."
            echo "::error::Verify CLOUDFLARE_API_TOKEN has Account:Cloudflare Pages:Edit scope."
            exit 1
          fi
          echo "Cloudflare credentials validated — Pages project reachable"

      - uses: convergent-systems-co/action-atoms/composite/cs-page-deployment@d063c246b27f30d806c3902685a1c00b9d4ef1f0
        with:
          site-dir: web/ai-constitution
          project-name: ai-constitution
          branch: ${{ steps.branch.outputs.label }}
          # node-version: '22'  # default; explicit only if overriding
