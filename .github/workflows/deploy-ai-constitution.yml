name: Deploy ai-constitution.convergent-systems.co

# Cloudflare Pages direct-upload deploy of web/ai-constitution/.
# Terraform creates the Pages PROJECT (see terraform/ai-constitution/);
# this workflow uploads the built artifact via the
# cs-page-deployment composite action from action-atoms.

on:
  push:
    branches: [main]
    paths:
      - 'web/ai-constitution/**'
      - '.github/workflows/deploy-ai-constitution.yml'
  workflow_dispatch:
    inputs:
      preview:
        description: 'Deploy as a preview (separate URL) instead of production'
        type: boolean
        default: false

# Pages deploys are race-sensitive — only one in flight per branch.
concurrency:
  group: pages-ai-constitution
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-constitution.convergent-systems.co
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Workflow-dispatch input pulled into env (injection-safe per
      # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).
      PREVIEW: ${{ github.event.inputs.preview }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute deploy branch label
        id: branch
        shell: bash
        run: |
          # cs-page-deployment takes `branch` as a single input.
          # "main" → production; anything else → preview URL.
          if [ "$PREVIEW" = "true" ]; then
            echo "label=preview-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          else
            echo "label=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Create temporary deploy token
        id: cf_token
        env:
          CLOUDFLARE_MGMT_TOKEN: ${{ secrets.CLOUDFLARE_MGMT_TOKEN }}
        run: |
          EXPIRY=$(date -u -d "+8 hours" +"%Y-%m-%dT%H:%M:%SZ")
          PAYLOAD=$(jq -n --arg name "deploy-$(date +%s)" --arg expires "$EXPIRY" '{name: $name, expires_on: $expires, policies: [{effect: "allow", resources: {"com.cloudflare.api.account.e1fe0f0ce8ff18da4edc118372c30022": "*"}, permission_groups: [{id: "8d28297797f24fb8a0c332fe0866ec89", name: "Pages Write"},{id: "e247aedd66bd41cc9193af0213416666", name: "Pages Read"}]}]}')
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/e1fe0f0ce8ff18da4edc118372c30022/tokens" -H "Authorization: Bearer $CLOUDFLARE_MGMT_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD")
          TOKEN_ID=$(echo "$RESPONSE" | jq -r '.result.id // empty')
          TOKEN_VAL=$(echo "$RESPONSE" | jq -r '.result.value // empty')
          [ -z "$TOKEN_VAL" ] && echo "Failed: $(echo "$RESPONSE" | jq '.errors')" && exit 1
          echo "::add-mask::$TOKEN_VAL"
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "token_val=$TOKEN_VAL" >> "$GITHUB_OUTPUT"

      - uses: convergent-systems-co/action-atoms/composite/cs-page-deployment@d063c246b27f30d806c3902685a1c00b9d4ef1f0
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token_val }}
        with:
          site-dir: web/ai-constitution
          project-name: ai-constitution
          branch: ${{ steps.branch.outputs.label }}

      - name: Revoke temporary deploy token
        if: always()
        env:
          CLOUDFLARE_MGMT_TOKEN: ${{ secrets.CLOUDFLARE_MGMT_TOKEN }}
        run: |
          TOKEN_ID="${{ steps.cf_token.outputs.token_id }}"
          [ -z "$TOKEN_ID" ] && exit 0
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/e1fe0f0ce8ff18da4edc118372c30022/tokens/$TOKEN_ID" -H "Authorization: Bearer $CLOUDFLARE_MGMT_TOKEN"
