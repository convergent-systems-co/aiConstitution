# governance/seed/answers.example.yaml
#
# Example wizard answers, used for two purposes:
#   1. `ai setup --non-interactive --answers=<file>` — script the
#      wizard for fresh-machine bootstrap.
#   2. Reference for what shapes a complete answers.yaml takes.
#
# Per SPEC.md §3.1 (non-interactive mode) and questions.yaml
# (canonical taxonomy at the repo root).
#
# Keyed by qid (Q01..Q47.template). The value shape is either:
#   - a single string (the selected option's `value`), OR
#   - a list (for multi-select questions), OR
#   - a free-text answer for questions with allow_free_text: true.

