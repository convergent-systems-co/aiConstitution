# governance/wizard/questions.yaml
# v2.1 — reference-first setup (8 personalization questions only)
#
# The constitution template already contains all invariant rules:
# U1–U17, Clean Code, Testing, Security, Writing craft, etc.
# These 8 questions personalize the slots unique to each user.
# Domains are always both technical + prose (no longer a question).

version: "1.0"

phases:

  - id: P1
    title: "You"
    mandatory: true
    questions:

      - qid: Q01
        prompt: "What name or handle should your constitution use for you?"
        framing: |
          This appears in the document header, audit logs, and commit
          trailers. Full name, nickname, or handle — your choice.
        time: ~5s
        allow_free_text: true
        default: "Principal"
        persists_to: Constitution.md
        persists_to_section: "§1 header / §3 Principal"

      - qid: Q02
        prompt: "Which AI tools will this constitution govern?"
        framing: |
          Claude Code loads the full document. Copilot CLI and Cursor
          load the compact runtime (~3K tokens).
        time: ~5s
        options:
          - label: Claude Code
            value: claude-code
          - label: Copilot CLI
            value: copilot-cli
          - label: Cursor
            value: cursor
          - label: Codex / OpenAI Agents
            value: codex
        allow_free_text: true
        default: "claude-code"
        persists_to: Constitution.md
        persists_to_section: "§1.6 Integration"

      - qid: Q03
        prompt: "What is your primary work context?"
        framing: |
          Used in provenance lines and audit headers.
          Could be your employer, a project, or just 'personal'.
        time: ~5s
        allow_free_text: true
        allow_defer: true
        default: "personal"
        persists_to: Constitution.md
        persists_to_section: "§3 U4 provenance"

  - id: P2
    title: "Autonomy"
    mandatory: true
    questions:

      - qid: Q06
        prompt: "What is your per-task cost ceiling for cloud/API spending?"
        framing: |
          The AI will not spend beyond this amount without asking first.
        time: ~5s
        options:
          - label: "$1 — conservative"
            value: "$1"
          - label: "$5 — default"
            value: "$5"
          - label: "$25 — power user"
            value: "$25"
          - label: "No ceiling"
            value: "none"
            warning: Removes a safety gate. The AI may incur unbounded costs.
        default: "$5"
        persists_to: Constitution.md
        persists_to_section: "§3.2 Autonomy Gates §3.6"

      - qid: Q08
        prompt: "Which branch names should the AI never commit to directly?"
        framing: |
          The branch-guard hook enforces this. 'main' is always protected.
        time: ~5s
        options:
          - label: "main only"
            value: "main"
          - label: "main + release/*"
            value: "main,release/*"
          - label: "main + master + release/*"
            value: "main,master,release/*"
        allow_free_text: true
        default: "main"
        persists_to: Constitution.md
        persists_to_section: "§3.2 + branch-guard.json"

  - id: P3
    title: "Style"
    mandatory: true
    questions:

      - qid: Q10
        prompt: "How hard should the AI push back when it disagrees with you?"
        framing: |
          The AI never silently complies — this controls how persistent it
          is before deferring to your judgment.
        time: ~5s
        options:
          - label: "Flag once, then follow my lead"
            value: flag-once
          - label: "Keep pushing until I say 'noted, move on'"
            value: push-until-told
          - label: "Only flag safety-critical errors"
            value: flag-safety-only
        default: "flag-once"
        persists_to: Constitution.md
        persists_to_section: "§2.1 personal overlay"

      - qid: Q11
        prompt: "What response length do you prefer by default?"
        time: ~5s
        options:
          - label: "Match the complexity of my request"
            value: match-complexity
          - label: "Short — bottom line up front"
            value: shortest
          - label: "Full reasoning always visible"
            value: full
        default: "match-complexity"
        persists_to: Constitution.md
        persists_to_section: "§2.2 personal overlay"

      - qid: Q13
        prompt: "Should AI involvement be noted in git commit trailers?"
        framing: |
          Adds 'Co-Authored-By: Claude…' to commits where the AI wrote
          significant code. Useful for audit trails.
        time: ~5s
        options:
          - label: "Yes — add Co-Authored-By trailer"
            value: "true"
          - label: "No — keep commits clean"
            value: "false"
        default: "true"
        persists_to: Constitution.md
        persists_to_section: "§3.6 provenance"
