version: "2"

linters:
  # Explicit opt-in only — avoids noise from the full "standard" preset
  # while keeping a useful and sustainable set of checks.
  default: none
  enable:
    - errcheck
    - gosec
    - gocyclo
    - misspell
  settings:
    gocyclo:
      min-complexity: 25
    errcheck:
      # fmt.Print* to cmd output: broken-pipe is the only failure mode; non-actionable.
      # defer/cleanup Close and os.Remove*: best-effort; errors are non-fatal.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec]
      # defer X.Close() is the idiomatic Go pattern; Close errors are non-actionable.
      - linters: [errcheck]
        text: 'Error return value of.*\.Close.* is not checked'
      # G104: gosec alias for unhandled Close — same rationale.
      - linters: [gosec]
        text: "G104:"
      # G107/G110/G204/G702/G703: expected patterns in a CLI download/install tool.
      - linters: [gosec]
        text: "G107:|G110:|G204:|G702:|G703:"
      # G301/G306: permissions set deliberately per CLI install conventions.
      - linters: [gosec]
        text: "G301:|G306:"
      # G304: reading files via variable is expected in a CLI setup tool.
      - linters: [gosec]
        text: "G304:"
      # G115: int64→uint32 bounded by practical CLI metadata sizes.
      - linters: [gosec]
        text: "G115:"
      # G122: filepath.Walk TOCTOU — tracked as separate follow-up.
      - linters: [gosec]
        text: "G122:"
