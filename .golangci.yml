version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - gocyclo
    - revive
    - misspell
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
    errcheck:
      # fmt.Print* to cmd output: broken-pipe is the only failure mode; non-actionable.
      # defer/cleanup Close and os.Remove*: best-effort; errors are non-fatal.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec, unparam]
      # G107: HTTP requests with variable URLs are expected in a CLI download tool.
      # G110: Decompression of user-specified atoms is intentional (trusted source).
      # G204: CLI tools intentionally launch subprocesses with user-supplied args.
      # G703: Path operations in a CLI installer are intentional; inputs are validated.
      # G301/G306: Permissions set deliberately per CLI install conventions.
      - linters: [gosec]
        text: "G107:"
      - linters: [gosec]
        text: "G110:"
      - linters: [gosec]
        text: "G204:"
      - linters: [gosec]
        text: "G703:"
      - linters: [gosec]
        text: "G301:"
      - linters: [gosec]
        text: "G306:"
      # defer X.Close() is the idiomatic Go pattern; Close errors in defer are non-actionable.
      - linters: [errcheck]
        text: 'Error return value of.*\.Close.* is not checked'
      # G104: gosec alias for errcheck on Close() calls — same rationale as above.
      - linters: [gosec]
        text: "G104:"
      # G304: reading files via variable is expected in a CLI install/setup tool.
      - linters: [gosec]
        text: "G304:"
      # G702: CLI tools launch subprocesses with validated user-derived arguments.
      - linters: [gosec]
        text: "G702:"
      # G115: int64→uint32 in CLI metadata is bounded by practical file sizes.
      - linters: [gosec]
        text: "G115:"
